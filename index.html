<!DOCTYPE html>
<html>
<head>
<title>Sweet Bites</title>

<style>
body{margin:0;font-family:Arial;background:#FFF5E4}

/* Navbar */
.navbar{
background:#FF8FA3;
padding:15px;
display:flex;
justify-content:space-between;
}

.navbar a{
color:white;
text-decoration:none;
margin:10px;
font-weight:bold;
}

/* Hero */
.hero{
height:70vh;
background:url('images/hero.jpg') center/cover;
display:flex;
justify-content:center;
align-items:center;
color:white;
text-align:center;
}

.hero h1{font-size:48px;margin-bottom:10px}
.hero p{font-size:22px;margin-bottom:20px}

/* Buttons */
.btn{
background:#6B3E26;
color:white;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
transition:.3s;
}

.btn:hover{opacity:.8}

/* Featured Products */
.featured{
padding:30px;
text-align:center;
}

.featured h2{margin-bottom:20px}
.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:15px;
width:220px;
text-align:center;
transition:.3s;
}

.card:hover{transform:scale(1.05)}

.price{color:#FF8FA3;font-weight:bold;margin:10px 0}

.card img{width:100%;border-radius:10px;height:150px;object-fit:cover}

</style>

</head>

<body>

<div class="navbar">
<div>Sweet Bites 🍰</div>
<div>
<a href="index.html">Home</a>
<a href="product.html">Products</a>
<a href="cart.html">Cart</a>
</div>
</div>

<div class="hero">
<div>
<h1 style ="color:black">Welcome to Sweet Bites 🍩</h1>
<p style = "color: rgb(252, 109, 109);">Delicious cakes, donuts, cookies & cupcakes delivered fresh to you!</p>
<a href="product.html"><button class="btn">Shop Now</button></a>
</div>
</div>

<div class="featured">
<h2>Featured Products</h2>
<div class="container">
<div class="card">
<img src="images/img10.jpg" alt="Cake">
<h3>Cake</h3>
<p class="price">150 EGP</p>
<a href="product.html"><button class="btn">View</button></a>
</div>
<div class="card">
<img src="images/img8.jpg" alt="Donut">
<h3>Donut</h3>
<p class="price">50 EGP</p>
<a href="product.html"><button class="btn">View</button></a>
</div>
<div class="card">
<img src="images/img9.jpg" alt="Cookies">
<h3>Cookies</h3>
<p class="price">80 EGP</p>
<a href="product.html"><button class="btn">View</button></a>
</div>
<div class="card">
<img src="images/img123.jpg" alt="Cupcake">
<h3>Cupcake</h3>
<p class="price">60 EGP</p>
<a href="product.html"><button class="btn">View</button></a>
</div>
</div>
</div>

</body>
</html>
